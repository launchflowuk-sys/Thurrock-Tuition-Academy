kind = "web"
previewPath = "/"
title = "Thurrock Tuition Academy"
version = "1.0.0"
id = "artifacts/thurrock-tuition"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24924

[services.development]
run = "pnpm --filter @workspace/thurrock-tuition run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thurrock-tuition", "run", "build" ]
publicDir = "artifacts/thurrock-tuition/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24924"
BASE_PATH = "/"
