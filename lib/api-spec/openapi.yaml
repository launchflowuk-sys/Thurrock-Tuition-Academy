openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Thurrock Tuition Academy API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: enquiries
    description: Assessment booking enquiries
  - name: students
    description: Student management
  - name: sessions
    description: Session and schedule management
  - name: progress
    description: Progress notes and tracking
  - name: tasks
    description: Task assignments
  - name: payments
    description: Payment tracking
  - name: dashboard
    description: Dashboard summary data
  - name: settings
    description: Site settings management
  - name: staff
    description: Staff member management
  - name: messages
    description: Two-way messaging between admin and parents
  - name: Storage
    description: Object storage upload and serving endpoints
  - name: intake
    description: Intake / onboarding form submissions
  - name: courses
    description: Course management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── ENQUIRIES ───────────────────────────────────────────────────────────────
  /enquiries:
    get:
      operationId: listEnquiries
      tags: [enquiries]
      summary: List all enquiries
      responses:
        "200":
          description: List of enquiries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Enquiry"
    post:
      operationId: createEnquiry
      tags: [enquiries]
      summary: Submit a new assessment enquiry (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnquiryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enquiry"

  /enquiries/{id}:
    get:
      operationId: getEnquiry
      tags: [enquiries]
      summary: Get a single enquiry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Enquiry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enquiry"
        "404":
          description: Not found
    patch:
      operationId: updateEnquiry
      tags: [enquiries]
      summary: Update enquiry status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnquiryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enquiry"
        "404":
          description: Not found

  # ─── STUDENTS ────────────────────────────────────────────────────────────────
  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get a student profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Not found
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Not found
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ─── SESSIONS ────────────────────────────────────────────────────────────────
  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a session slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Not found
    patch:
      operationId: updateSession
      tags: [sessions]
      summary: Update a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Not found

  # ─── PROGRESS NOTES ──────────────────────────────────────────────────────────
  /progress:
    get:
      operationId: listProgressNotes
      tags: [progress]
      summary: List all progress notes (optionally filtered by student)
      parameters:
        - name: studentId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Progress notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgressNote"
    post:
      operationId: createProgressNote
      tags: [progress]
      summary: Add a progress note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressNoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressNote"

  /progress/{id}:
    patch:
      operationId: updateProgressNote
      tags: [progress]
      summary: Update a progress note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressNoteUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressNote"
        "404":
          description: Not found
    delete:
      operationId: deleteProgressNote
      tags: [progress]
      summary: Delete a progress note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── TASKS ───────────────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: studentId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Assign a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task (mark complete, edit details)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── PAYMENTS ────────────────────────────────────────────────────────────────
  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List payment records
      parameters:
        - name: studentId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Log a payment record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}:
    patch:
      operationId: updatePayment
      tags: [payments]
      summary: Update a payment record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
    delete:
      operationId: deletePayment
      tags: [payments]
      summary: Delete a payment record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard overview stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/session-availability:
    get:
      operationId: getSessionAvailability
      tags: [dashboard]
      summary: Get Saturday session slot availability
      responses:
        "200":
          description: Slot availability
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SlotAvailability"

  # ─── STAFF ───────────────────────────────────────────────────────────────────
  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff members
      responses:
        "200":
          description: List of staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Add a new staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /staff/{id}:
    get:
      operationId: getStaff
      tags: [staff]
      summary: Get a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "404":
          description: Not found
    patch:
      operationId: updateStaff
      tags: [staff]
      summary: Update a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "404":
          description: Not found
    delete:
      operationId: deleteStaff
      tags: [staff]
      summary: Remove a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ─── MESSAGES ────────────────────────────────────────────────────────────────
  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List messages for a student
      parameters:
        - name: studentId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/{id}/read:
    patch:
      operationId: markMessageRead
      tags: [messages]
      summary: Mark a message as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "404":
          description: Not found

  # ─── STORAGE ──────────────────────────────────────────────────────────────────
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve a stored object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Not found

  # ─── SETTINGS ────────────────────────────────────────────────────────────────
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get all site settings (admin)
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update site settings (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /settings/widget:
    get:
      operationId: getWidgetSettings
      tags: [settings]
      summary: Get booking widget settings (public)
      responses:
        "200":
          description: Widget settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WidgetSettings"

  /settings/payment-public:
    get:
      operationId: getPaymentPublicSettings
      tags: [settings]
      summary: Get public payment processor settings (processor, mode, publishable keys)
      responses:
        "200":
          description: Public payment settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentPublicSettings"

  # ─── INTAKE SUBMISSIONS ──────────────────────────────────────────────────────
  /intake:
    get:
      operationId: listIntakeSubmissions
      tags: [intake]
      summary: List all intake submissions (admin)
      responses:
        "200":
          description: List of intake submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntakeSubmission"
    post:
      operationId: createIntakeSubmission
      tags: [intake]
      summary: Submit an intake / onboarding form (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeSubmissionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeSubmission"

  /intake/{id}:
    patch:
      operationId: updateIntakeSubmission
      tags: [intake]
      summary: Update intake submission status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeSubmissionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeSubmission"
        "404":
          description: Not found
    delete:
      operationId: deleteIntakeSubmission
      tags: [intake]
      summary: Delete an intake submission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /intake/{id}/reply:
    post:
      operationId: replyToIntakeSubmission
      tags: [intake]
      summary: Send an email reply to an applicant (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeReplyInput"
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "400":
          description: SMTP not configured or other error
        "404":
          description: Submission not found

  # ─── COURSES ─────────────────────────────────────────────────────────────────
  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List all courses
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a course (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /courses/{id}:
    patch:
      operationId: updateCourse
      tags: [courses]
      summary: Update a course (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "404":
          description: Not found
    delete:
      operationId: deleteCourse
      tags: [courses]
      summary: Delete a course (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ─── ENQUIRY ───────────────────────────────────────────────────────────────
    Enquiry:
      type: object
      required: [id, parentName, childName, childAge, subject, level, preferredSlot, contactNumber, status, createdAt]
      properties:
        id:            { type: integer }
        parentName:    { type: string }
        childName:     { type: string }
        childAge:      { type: integer }
        subject:       { type: string }
        level:         { type: string }
        preferredSlot: { type: string }
        contactNumber: { type: string }
        email:         { type: ["string", "null"] }
        notes:         { type: ["string", "null"] }
        status:        { type: string }
        createdAt:     { type: string }

    EnquiryInput:
      type: object
      required: [parentName, childName, childAge, subject, level, preferredSlot, contactNumber]
      properties:
        parentName:    { type: string, minLength: 1 }
        childName:     { type: string, minLength: 1 }
        childAge:      { type: integer }
        subject:       { type: string }
        level:         { type: string }
        preferredSlot: { type: string }
        contactNumber: { type: string, minLength: 1 }
        email:         { type: string }
        notes:         { type: string }

    EnquiryUpdate:
      type: object
      properties:
        status: { type: string }
        notes:  { type: string }

    # ─── STUDENT ───────────────────────────────────────────────────────────────
    Student:
      type: object
      required: [id, name, age, parentName, contactNumber, subject, level, sessionSlot, clerkUserId, joinedAt]
      properties:
        id:            { type: integer }
        name:          { type: string }
        age:           { type: integer }
        parentName:    { type: string }
        contactNumber: { type: string }
        subject:       { type: string }
        level:         { type: string }
        sessionSlot:   { type: string }
        parentEmail:   { type: ["string", "null"] }
        clerkUserId:   { type: ["string", "null"] }
        notes:         { type: ["string", "null"] }
        photoUrl:      { type: ["string", "null"] }
        joinedAt:      { type: string }

    StudentInput:
      type: object
      required: [name, age, parentName, contactNumber, subject, level, sessionSlot]
      properties:
        name:          { type: string, minLength: 1 }
        age:           { type: integer }
        parentName:    { type: string, minLength: 1 }
        contactNumber: { type: string, minLength: 1 }
        subject:       { type: string }
        level:         { type: string }
        sessionSlot:   { type: string }
        parentEmail:   { type: string }
        clerkUserId:   { type: string }
        notes:         { type: string }
        photoUrl:      { type: string }

    StudentUpdate:
      type: object
      properties:
        name:          { type: string }
        age:           { type: integer }
        parentName:    { type: string }
        contactNumber: { type: string }
        subject:       { type: string }
        level:         { type: string }
        sessionSlot:   { type: string }
        parentEmail:   { type: string }
        clerkUserId:   { type: string }
        notes:         { type: string }
        photoUrl:      { type: string }

    # ─── SESSION ───────────────────────────────────────────────────────────────
    Session:
      type: object
      required: [id, date, slotLabel, startTime, endTime, capacity, studentIds, notes, createdAt]
      properties:
        id:          { type: integer }
        date:        { type: string }
        slotLabel:   { type: string }
        startTime:   { type: string }
        endTime:     { type: string }
        capacity:    { type: integer }
        studentIds:  { type: array, items: { type: integer } }
        notes:       { type: ["string", "null"] }
        createdAt:   { type: string }

    SessionInput:
      type: object
      required: [date, slotLabel, startTime, endTime, capacity]
      properties:
        date:       { type: string }
        slotLabel:  { type: string }
        startTime:  { type: string }
        endTime:    { type: string }
        capacity:   { type: integer }
        studentIds: { type: array, items: { type: integer } }
        notes:      { type: string }

    SessionUpdate:
      type: object
      properties:
        date:       { type: string }
        slotLabel:  { type: string }
        startTime:  { type: string }
        endTime:    { type: string }
        capacity:   { type: integer }
        studentIds: { type: array, items: { type: integer } }
        notes:      { type: string }

    # ─── PROGRESS NOTE ─────────────────────────────────────────────────────────
    ProgressNote:
      type: object
      required: [id, studentId, content, subject, sessionDate, createdAt]
      properties:
        id:          { type: integer }
        studentId:   { type: integer }
        content:     { type: string }
        subject:     { type: string }
        sessionDate: { type: string }
        createdAt:   { type: string }

    ProgressNoteInput:
      type: object
      required: [studentId, content, subject, sessionDate]
      properties:
        studentId:   { type: integer }
        content:     { type: string, minLength: 1 }
        subject:     { type: string }
        sessionDate: { type: string }

    ProgressNoteUpdate:
      type: object
      properties:
        content:     { type: string }
        subject:     { type: string }
        sessionDate: { type: string }

    # ─── TASK ──────────────────────────────────────────────────────────────────
    Task:
      type: object
      required: [id, studentId, title, description, subject, dueDate, completed, createdAt]
      properties:
        id:          { type: integer }
        studentId:   { type: integer }
        title:       { type: string }
        description: { type: ["string", "null"] }
        subject:     { type: string }
        dueDate:     { type: string }
        completed:   { type: boolean }
        createdAt:   { type: string }

    TaskInput:
      type: object
      required: [studentId, title, subject, dueDate]
      properties:
        studentId:   { type: integer }
        title:       { type: string, minLength: 1 }
        description: { type: string }
        subject:     { type: string }
        dueDate:     { type: string }

    TaskUpdate:
      type: object
      properties:
        title:       { type: string }
        description: { type: string }
        subject:     { type: string }
        dueDate:     { type: string }
        completed:   { type: boolean }

    # ─── PAYMENT ───────────────────────────────────────────────────────────────
    Payment:
      type: object
      required: [id, studentId, sessionDate, amount, status, createdAt]
      properties:
        id:          { type: integer }
        studentId:   { type: integer }
        sessionDate: { type: string }
        amount:      { type: number }
        status:      { type: string }
        notes:       { type: ["string", "null"] }
        createdAt:   { type: string }

    PaymentInput:
      type: object
      required: [studentId, sessionDate, amount]
      properties:
        studentId:   { type: integer }
        sessionDate: { type: string }
        amount:      { type: number }
        status:      { type: string }
        notes:       { type: string }

    PaymentUpdate:
      type: object
      properties:
        status: { type: string }
        notes:  { type: string }

    # ─── DASHBOARD ─────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalStudents, pendingEnquiries, sessionsThisWeek, outstandingPayments, recentEnquiries, newIntakeSubmissions]
      properties:
        totalStudents:          { type: integer }
        pendingEnquiries:       { type: integer }
        sessionsThisWeek:       { type: integer }
        outstandingPayments:    { type: integer }
        newIntakeSubmissions:   { type: integer }
        recentEnquiries:
          type: array
          items:
            $ref: "#/components/schemas/Enquiry"

    ActivityItem:
      type: object
      required: [id, type, description, timestamp]
      properties:
        id:          { type: integer }
        type:        { type: string }
        description: { type: string }
        timestamp:   { type: string }

    SlotAvailability:
      type: object
      required: [slotLabel, startTime, endTime, capacity, enrolled, available]
      properties:
        slotLabel:  { type: string }
        startTime:  { type: string }
        endTime:    { type: string }
        capacity:   { type: integer }
        enrolled:   { type: integer }
        available:  { type: boolean }

    # ─── SETTINGS ───────────────────────────────────────────────────────────────
    Settings:
      type: object
      required: [smtpEnabled, paymentEnabled, bookingWidgetEnabled]
      properties:
        smtpHost:               { type: ["string", "null"] }
        smtpPort:               { type: ["integer", "null"] }
        smtpUser:               { type: ["string", "null"] }
        smtpFrom:               { type: ["string", "null"] }
        smtpEnabled:            { type: boolean }
        paymentProcessor:       { type: ["string", "null"] }
        paymentApiKey:          { type: ["string", "null"] }
        paymentAppId:           { type: ["string", "null"] }
        paymentAccessToken:     { type: ["string", "null"] }
        paymentLocationId:      { type: ["string", "null"] }
        paymentMode:            { type: ["string", "null"] }
        paymentEnabled:         { type: boolean }
        paypalClientId:         { type: ["string", "null"] }
        paypalSecret:           { type: ["string", "null"] }
        stripePublishableKey:   { type: ["string", "null"] }
        stripeSecretKey:        { type: ["string", "null"] }
        bookingWidgetCode:      { type: ["string", "null"] }
        bookingWidgetEnabled:   { type: boolean }
        bookingWidgetPlacement: { type: ["string", "null"] }
        updatedAt:              { type: string }

    SettingsInput:
      type: object
      properties:
        smtpHost:               { type: string }
        smtpPort:               { type: integer }
        smtpUser:               { type: string }
        smtpPass:               { type: string }
        smtpFrom:               { type: string }
        smtpEnabled:            { type: boolean }
        paymentProcessor:       { type: string }
        paymentApiKey:          { type: string }
        paymentAppId:           { type: string }
        paymentAccessToken:     { type: string }
        paymentLocationId:      { type: string }
        paymentMode:            { type: string }
        paymentEnabled:         { type: boolean }
        paypalClientId:         { type: string }
        paypalSecret:           { type: string }
        stripePublishableKey:   { type: string }
        stripeSecretKey:        { type: string }
        bookingWidgetCode:      { type: string }
        bookingWidgetEnabled:   { type: boolean }
        bookingWidgetPlacement: { type: string }

    WidgetSettings:
      type: object
      required: [bookingWidgetEnabled]
      properties:
        bookingWidgetCode:      { type: ["string", "null"] }
        bookingWidgetEnabled:   { type: boolean }
        bookingWidgetPlacement: { type: ["string", "null"] }

    PaymentPublicSettings:
      type: object
      required: [paymentEnabled]
      properties:
        paymentEnabled:       { type: boolean }
        paymentProcessor:     { type: ["string", "null"] }
        paymentMode:          { type: ["string", "null"] }
        paymentAppId:         { type: ["string", "null"] }
        paymentLocationId:    { type: ["string", "null"] }
        paypalClientId:       { type: ["string", "null"] }
        stripePublishableKey: { type: ["string", "null"] }

    # ─── STAFF ──────────────────────────────────────────────────────────────────
    StaffMember:
      type: object
      required: [id, name, email, role, joinedAt]
      properties:
        id:           { type: integer }
        name:         { type: string }
        email:        { type: string }
        phone:        { type: ["string", "null"] }
        role:         { type: string }
        hourlyRate:   { type: ["number", "null"] }
        hoursPerWeek: { type: ["integer", "null"] }
        notes:        { type: ["string", "null"] }
        joinedAt:     { type: string }

    StaffInput:
      type: object
      required: [name, email, role]
      properties:
        name:         { type: string, minLength: 1 }
        email:        { type: string, minLength: 1 }
        phone:        { type: string }
        role:         { type: string }
        hourlyRate:   { type: number }
        hoursPerWeek: { type: integer }
        notes:        { type: string }

    StaffUpdate:
      type: object
      properties:
        name:         { type: string }
        email:        { type: string }
        phone:        { type: string }
        role:         { type: string }
        hourlyRate:   { type: number }
        hoursPerWeek: { type: integer }
        notes:        { type: string }

    # ─── MESSAGE ─────────────────────────────────────────────────────────────────
    Message:
      type: object
      required: [id, studentId, senderRole, content, createdAt]
      properties:
        id:         { type: integer }
        studentId:  { type: integer }
        senderRole: { type: string }
        content:    { type: string }
        createdAt:  { type: string }
        readAt:     { type: ["string", "null"] }

    MessageInput:
      type: object
      required: [studentId, senderRole, content]
      properties:
        studentId:  { type: integer }
        senderRole: { type: string }
        content:    { type: string, minLength: 1 }

    # ─── STORAGE ─────────────────────────────────────────────────────────────────
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:        { type: string, minLength: 1 }
        size:        { type: integer, minimum: 1 }
        contentType: { type: string, minLength: 1 }

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:  { type: string, format: uri }
        objectPath: { type: string }

    # ─── INTAKE SUBMISSION ────────────────────────────────────────────────────────
    IntakeSubmission:
      type: object
      required: [id, parentName, childName, childAge, email, contactNumber, subject, level, status, createdAt]
      properties:
        id:                 { type: integer }
        parentName:         { type: string }
        childName:          { type: string }
        childAge:           { type: integer }
        email:              { type: string }
        contactNumber:      { type: string }
        subject:            { type: string }
        level:              { type: string }
        currentSchool:      { type: ["string", "null"] }
        currentAttainment:  { type: ["string", "null"] }
        goals:              { type: ["string", "null"] }
        previousTutoring:   { type: ["string", "null"] }
        howDidYouHear:      { type: ["string", "null"] }
        preferredSlot:      { type: ["string", "null"] }
        additionalInfo:     { type: ["string", "null"] }
        status:             { type: string }
        createdAt:          { type: string }

    IntakeSubmissionInput:
      type: object
      required: [parentName, childName, childAge, email, contactNumber, subject, level]
      properties:
        parentName:         { type: string, minLength: 1 }
        childName:          { type: string, minLength: 1 }
        childAge:           { type: integer }
        email:              { type: string, minLength: 1 }
        contactNumber:      { type: string, minLength: 1 }
        subject:            { type: string }
        level:              { type: string }
        currentSchool:      { type: string }
        currentAttainment:  { type: string }
        goals:              { type: string }
        previousTutoring:   { type: string }
        howDidYouHear:      { type: string }
        preferredSlot:      { type: string }
        additionalInfo:     { type: string }

    IntakeSubmissionUpdate:
      type: object
      properties:
        status: { type: string }

    IntakeReplyInput:
      type: object
      required: [subject, body]
      properties:
        subject: { type: string, minLength: 1 }
        body:    { type: string, minLength: 1 }

    # ─── COURSE ──────────────────────────────────────────────────────────────────
    Course:
      type: object
      required: [id, title, description, subject, level, type, price, duration, available, displayOrder, createdAt]
      properties:
        id:           { type: integer }
        title:        { type: string }
        description:  { type: string }
        subject:      { type: string }
        level:        { type: string }
        type:         { type: string }
        price:        { type: number }
        duration:     { type: string }
        imageUrl:     { type: ["string", "null"] }
        available:    { type: boolean }
        displayOrder: { type: integer }
        createdAt:    { type: string }

    CourseInput:
      type: object
      required: [title, description, subject, level, price, duration]
      properties:
        title:        { type: string, minLength: 1 }
        description:  { type: string, minLength: 1 }
        subject:      { type: string }
        level:        { type: string }
        type:         { type: string }
        price:        { type: number }
        duration:     { type: string }
        imageUrl:     { type: string }
        available:    { type: boolean }
        displayOrder: { type: integer }

    CourseUpdate:
      type: object
      properties:
        title:        { type: string }
        description:  { type: string }
        subject:      { type: string }
        level:        { type: string }
        type:         { type: string }
        price:        { type: number }
        duration:     { type: string }
        imageUrl:     { type: string }
        available:    { type: boolean }
        displayOrder: { type: integer }

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error: { type: string }
