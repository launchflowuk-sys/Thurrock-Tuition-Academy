openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Thurrock Tuition Academy API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: enquiries
    description: Assessment booking enquiries
  - name: students
    description: Student management
  - name: sessions
    description: Session and schedule management
  - name: progress
    description: Progress notes and tracking
  - name: tasks
    description: Task assignments
  - name: payments
    description: Payment tracking
  - name: dashboard
    description: Dashboard summary data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── ENQUIRIES ───────────────────────────────────────────────────────────────
  /enquiries:
    get:
      operationId: listEnquiries
      tags: [enquiries]
      summary: List all enquiries
      responses:
        "200":
          description: List of enquiries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Enquiry"
    post:
      operationId: createEnquiry
      tags: [enquiries]
      summary: Submit a new assessment enquiry (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnquiryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enquiry"

  /enquiries/{id}:
    get:
      operationId: getEnquiry
      tags: [enquiries]
      summary: Get a single enquiry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Enquiry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enquiry"
        "404":
          description: Not found
    patch:
      operationId: updateEnquiry
      tags: [enquiries]
      summary: Update enquiry status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnquiryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enquiry"
        "404":
          description: Not found

  # ─── STUDENTS ────────────────────────────────────────────────────────────────
  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get a student profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Not found
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Not found
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ─── SESSIONS ────────────────────────────────────────────────────────────────
  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a session slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Not found
    patch:
      operationId: updateSession
      tags: [sessions]
      summary: Update a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Not found

  # ─── PROGRESS NOTES ──────────────────────────────────────────────────────────
  /progress:
    get:
      operationId: listProgressNotes
      tags: [progress]
      summary: List all progress notes (optionally filtered by student)
      parameters:
        - name: studentId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Progress notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgressNote"
    post:
      operationId: createProgressNote
      tags: [progress]
      summary: Add a progress note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressNoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressNote"

  /progress/{id}:
    patch:
      operationId: updateProgressNote
      tags: [progress]
      summary: Update a progress note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressNoteUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressNote"
        "404":
          description: Not found
    delete:
      operationId: deleteProgressNote
      tags: [progress]
      summary: Delete a progress note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── TASKS ───────────────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: studentId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Assign a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task (mark complete, edit details)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── PAYMENTS ────────────────────────────────────────────────────────────────
  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List payment records
      parameters:
        - name: studentId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Log a payment record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}:
    patch:
      operationId: updatePayment
      tags: [payments]
      summary: Update a payment record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard overview stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/session-availability:
    get:
      operationId: getSessionAvailability
      tags: [dashboard]
      summary: Get Saturday session slot availability
      responses:
        "200":
          description: Slot availability
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SlotAvailability"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ─── ENQUIRY ───────────────────────────────────────────────────────────────
    Enquiry:
      type: object
      required: [id, parentName, childName, childAge, subject, level, preferredSlot, contactNumber, status, createdAt]
      properties:
        id:            { type: integer }
        parentName:    { type: string }
        childName:     { type: string }
        childAge:      { type: integer }
        subject:       { type: string }
        level:         { type: string }
        preferredSlot: { type: string }
        contactNumber: { type: string }
        notes:         { type: ["string", "null"] }
        status:        { type: string }
        createdAt:     { type: string }

    EnquiryInput:
      type: object
      required: [parentName, childName, childAge, subject, level, preferredSlot, contactNumber]
      properties:
        parentName:    { type: string, minLength: 1 }
        childName:     { type: string, minLength: 1 }
        childAge:      { type: integer }
        subject:       { type: string }
        level:         { type: string }
        preferredSlot: { type: string }
        contactNumber: { type: string, minLength: 1 }
        notes:         { type: string }

    EnquiryUpdate:
      type: object
      properties:
        status: { type: string }
        notes:  { type: string }

    # ─── STUDENT ───────────────────────────────────────────────────────────────
    Student:
      type: object
      required: [id, name, age, parentName, contactNumber, subject, level, sessionSlot, clerkUserId, joinedAt]
      properties:
        id:            { type: integer }
        name:          { type: string }
        age:           { type: integer }
        parentName:    { type: string }
        contactNumber: { type: string }
        subject:       { type: string }
        level:         { type: string }
        sessionSlot:   { type: string }
        clerkUserId:   { type: ["string", "null"] }
        notes:         { type: ["string", "null"] }
        joinedAt:      { type: string }

    StudentInput:
      type: object
      required: [name, age, parentName, contactNumber, subject, level, sessionSlot]
      properties:
        name:          { type: string, minLength: 1 }
        age:           { type: integer }
        parentName:    { type: string, minLength: 1 }
        contactNumber: { type: string, minLength: 1 }
        subject:       { type: string }
        level:         { type: string }
        sessionSlot:   { type: string }
        clerkUserId:   { type: string }
        notes:         { type: string }

    StudentUpdate:
      type: object
      properties:
        name:          { type: string }
        age:           { type: integer }
        parentName:    { type: string }
        contactNumber: { type: string }
        subject:       { type: string }
        level:         { type: string }
        sessionSlot:   { type: string }
        clerkUserId:   { type: string }
        notes:         { type: string }

    # ─── SESSION ───────────────────────────────────────────────────────────────
    Session:
      type: object
      required: [id, date, slotLabel, startTime, endTime, capacity, studentIds, notes, createdAt]
      properties:
        id:          { type: integer }
        date:        { type: string }
        slotLabel:   { type: string }
        startTime:   { type: string }
        endTime:     { type: string }
        capacity:    { type: integer }
        studentIds:  { type: array, items: { type: integer } }
        notes:       { type: ["string", "null"] }
        createdAt:   { type: string }

    SessionInput:
      type: object
      required: [date, slotLabel, startTime, endTime, capacity]
      properties:
        date:       { type: string }
        slotLabel:  { type: string }
        startTime:  { type: string }
        endTime:    { type: string }
        capacity:   { type: integer }
        studentIds: { type: array, items: { type: integer } }
        notes:      { type: string }

    SessionUpdate:
      type: object
      properties:
        date:       { type: string }
        slotLabel:  { type: string }
        startTime:  { type: string }
        endTime:    { type: string }
        capacity:   { type: integer }
        studentIds: { type: array, items: { type: integer } }
        notes:      { type: string }

    # ─── PROGRESS NOTE ─────────────────────────────────────────────────────────
    ProgressNote:
      type: object
      required: [id, studentId, content, subject, sessionDate, createdAt]
      properties:
        id:          { type: integer }
        studentId:   { type: integer }
        content:     { type: string }
        subject:     { type: string }
        sessionDate: { type: string }
        createdAt:   { type: string }

    ProgressNoteInput:
      type: object
      required: [studentId, content, subject, sessionDate]
      properties:
        studentId:   { type: integer }
        content:     { type: string, minLength: 1 }
        subject:     { type: string }
        sessionDate: { type: string }

    ProgressNoteUpdate:
      type: object
      properties:
        content:     { type: string }
        subject:     { type: string }
        sessionDate: { type: string }

    # ─── TASK ──────────────────────────────────────────────────────────────────
    Task:
      type: object
      required: [id, studentId, title, description, subject, dueDate, completed, createdAt]
      properties:
        id:          { type: integer }
        studentId:   { type: integer }
        title:       { type: string }
        description: { type: ["string", "null"] }
        subject:     { type: string }
        dueDate:     { type: string }
        completed:   { type: boolean }
        createdAt:   { type: string }

    TaskInput:
      type: object
      required: [studentId, title, subject, dueDate]
      properties:
        studentId:   { type: integer }
        title:       { type: string, minLength: 1 }
        description: { type: string }
        subject:     { type: string }
        dueDate:     { type: string }

    TaskUpdate:
      type: object
      properties:
        title:       { type: string }
        description: { type: string }
        subject:     { type: string }
        dueDate:     { type: string }
        completed:   { type: boolean }

    # ─── PAYMENT ───────────────────────────────────────────────────────────────
    Payment:
      type: object
      required: [id, studentId, sessionDate, amount, paid, createdAt]
      properties:
        id:          { type: integer }
        studentId:   { type: integer }
        sessionDate: { type: string }
        amount:      { type: number }
        paid:        { type: boolean }
        notes:       { type: ["string", "null"] }
        createdAt:   { type: string }

    PaymentInput:
      type: object
      required: [studentId, sessionDate, amount]
      properties:
        studentId:   { type: integer }
        sessionDate: { type: string }
        amount:      { type: number }
        paid:        { type: boolean }
        notes:       { type: string }

    PaymentUpdate:
      type: object
      properties:
        paid:  { type: boolean }
        notes: { type: string }

    # ─── DASHBOARD ─────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalStudents, pendingEnquiries, sessionsThisWeek, outstandingPayments, recentEnquiries]
      properties:
        totalStudents:        { type: integer }
        pendingEnquiries:     { type: integer }
        sessionsThisWeek:     { type: integer }
        outstandingPayments:  { type: integer }
        recentEnquiries:
          type: array
          items:
            $ref: "#/components/schemas/Enquiry"

    ActivityItem:
      type: object
      required: [id, type, description, timestamp]
      properties:
        id:          { type: integer }
        type:        { type: string }
        description: { type: string }
        timestamp:   { type: string }

    SlotAvailability:
      type: object
      required: [slotLabel, startTime, endTime, capacity, enrolled, available]
      properties:
        slotLabel:  { type: string }
        startTime:  { type: string }
        endTime:    { type: string }
        capacity:   { type: integer }
        enrolled:   { type: integer }
        available:  { type: boolean }
